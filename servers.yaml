# ══════════════════════════════════════════════════════════════
# servers.yaml — WSL2 + Windows 局域网三机配置
# 主控机：4090（在此机器上运行 distributed_dispatch.py）
# ══════════════════════════════════════════════════════════════
#
# 前置准备（每台机器都要做）：
#   1. 开启 WSL2 的 SSH 服务：
#        sudo apt install -y openssh-server
#        sudo service ssh start
#        # 让 WSL2 开机自启 SSH（在 Windows 任务计划程序里加，或写入 /etc/wsl.conf）
#
#   2. 获取每台机器 WSL2 的 IP（每次重启会变！）：
#        hostname -I   # 在 WSL2 内执行，取第一个 IP，形如 172.x.x.x
#        # 推荐：用 Windows 主机 IP + 端口转发代替（见下方 port_forward 说明）
#
#   3. 配置免密登录（在主控 4090 的 WSL2 里执行）：
#        ssh-keygen -t ed25519 -C "pipeline"   # 一路回车
#        ssh-copy-id -i ~/.ssh/id_ed25519.pub ubuntu@<A6000_WSL_IP>
#        ssh-copy-id -i ~/.ssh/id_ed25519.pub ubuntu@<A8000_WSL_IP>
#
#   4. NAS/共享存储：三台机器通过 Windows 共享文件夹挂载同一份素材
#        # 在 WSL2 里挂载 Windows 共享（示例）：
#        sudo mkdir -p /mnt/nas
#        sudo mount -t drvfs '\\192.168.1.x\movies' /mnt/nas
#        # 或直接用 /mnt/d/ 这样访问 Windows D盘
#
# ── WSL2 IP 稳定化方案（强烈推荐）────────────────────────────
# 问题：WSL2 每次重启 IP 都会变（172.x.x.x 是虚拟子网）
# 方案A：在 Windows 侧做端口转发，用 Windows 的固定局域网 IP 代理到 WSL2
#   # 在 Windows PowerShell（管理员）里执行，把本机 Windows IP:2222 → WSL2:22
#   netsh interface portproxy add v4tov4 `
#     listenport=2222 listenaddress=0.0.0.0 `
#     connectport=22 connectaddress=(wsl hostname -I).split()[0]
#   # 防火墙放行：
#   netsh advfirewall firewall add rule name="WSL SSH" `
#     dir=in action=allow protocol=TCP localport=2222
#   # 之后用 Windows 固定 IP:2222 访问这台机器的 WSL2
#
# 方案B（更简单）：给 WSL2 设置固定 IP（写入 .wslconfig）
#   # 在 %USERPROFILE%\.wslconfig 里加：
#   [wsl2]
#   networkingMode=mirrored   # Windows 11 22H2+ 支持，WSL2 直接用 Windows 网卡 IP
#   # 开启后 WSL2 IP 与 Windows 完全一致，直接用局域网 IP 访问
# ══════════════════════════════════════════════════════════════

servers:

  # ── A6000 机器（当前你操作的这台） ──────────────────────────
  - name: A6000
    # Windows 局域网 IP（固定，改成你实际的 IP）
    host: 192.168.50.102
    # 端口：如果用方案A端口转发，填 2222；如果用方案B mirrored，填 22
    port: 2222
    user: leolee               # WSL2 的 Linux 用户名
    ssh_key: ~/.ssh/id_ed25519
    gpus: [0]                  # A6000 单卡
    weight: 1.3                # 算力权重（相对值），A6000 48GB
    conda_env: movietest       # conda 环境名
    remote_script: ~/video_pipeline/process_videos.py
    # 素材路径（WSL2 内的路径，三台机器需要一致）
    # 如果挂载同一个 NAS：/mnt/nas/movies
    # 如果每台本地都有：/mnt/d/movies

  # ── A8000 机器 ──────────────────────────────────────────────
  - name: A8000
    host: 192.168.50.237
    port: 2222
    user: leolee
    ssh_key: ~/.ssh/id_ed25519
    gpus: [0]                  # A8000 单卡
    weight: 1.5                # A8000 48GB，算力最强
    conda_env: movietest
    remote_script: ~/video_pipeline/process_videos.py

  # ── 4090 主控机自身（白天不用，晚上加入） ────────────────────
  # 主控机也参与处理，直接 localhost
  - name: RTX4090_local
    host: localhost            # 主控机自己，不走 SSH
    port: 22
    user: ubuntu
    ssh_key: ~/.ssh/id_ed25519
    gpus: [0]                  # 4090 24GB
    weight: 1.0
    conda_env: movietest
    remote_script: ~/video_pipeline/process_videos.py
    # 白天只用 A6000+A8000 时，注释掉这一整个 server 块即可

# ══════════════════════════════════════════════════════════════
# 使用方式：
#
# 仅 A6000 + A8000（白天，4090 在用）：
#   注释掉 RTX4090_local 这个 server 块
  # python distributed_dispatch.py \
  #   --input-dir /mnt/d/movies \
  #   --output-dir /mnt/nas/output \
  #   --servers servers.yaml
#
# 三台全开（晚上）：
#   恢复 RTX4090_local，运行同样命令
#
# 断点续传（任意一台中断后）：
#   python distributed_dispatch.py ... --resume
# ══════════════════════════════════════════════════════════════
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pod_control</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>Stage 5 Pod Control</h1>
    <nav>
      <button data-tab="prepare" class="active">Prepare</button>
      <button data-tab="pods">Pods</button>
      <button data-tab="run">Run</button>
      <button data-tab="monitor">Monitor</button>
    </nav>
  </header>

  <main>
    <section id="tab-prepare" class="tab active">
      <div class="prepare-layout">
        <aside class="prepare-side">
          <h2>Movies</h2>
          <ul id="movie-list" class="list"></ul>

          <h2>Saved batches</h2>
          <ul id="batch-list" class="list"></ul>
        </aside>

        <div class="prepare-main">
          <section class="panel" id="filter-panel" hidden>
            <h2>Filter · <span id="current-movie"></span></h2>
            <div class="filter-form">
              <label>
                categories:
                <span id="category-checks"></span>
              </label>
              <label>
                <input type="checkbox" id="skip-bad-quality" checked />
                skip_bad_quality
              </label>
              <label>
                <input type="checkbox" id="skip-landscape" checked />
                skip_landscape
              </label>
              <label>
                max_shots:
                <input type="number" id="max-shots" min="1" placeholder="null" />
              </label>
              <button id="apply-filter">Apply</button>
              <button id="random-sample">Random sample 10</button>
              <span id="match-count" class="muted"></span>
            </div>

            <div class="preview-grid" id="preview-grid"></div>

            <div class="pager">
              <button id="page-prev">Prev</button>
              <span id="page-info"></span>
              <button id="page-next">Next</button>
            </div>

            <form id="save-batch-form" class="save-batch">
              <input type="text" id="batch-name"
                     placeholder="batch name (slug)" required />
              <button type="submit">Save batch</button>
              <span id="save-batch-msg" class="muted"></span>
            </form>
          </section>

          <section class="panel" id="empty-hint">
            <p class="placeholder">左侧选一个 movie 开始准备 batch。</p>
          </section>
        </div>
      </div>
    </section>
    <section id="tab-pods" class="tab">
      <div class="pods-layout">
        <aside class="prepare-side">
          <h2>SSH profiles</h2>
          <ul id="pods-list" class="list"></ul>
          <button id="new-pod-btn" class="inline-btn">+ New profile</button>
        </aside>
        <div class="prepare-main">
          <section class="panel" id="pod-form-panel">
            <h2 id="pod-form-title">New pod profile</h2>
            <form id="pod-form" class="pod-form">
              <label>name <input name="name" required /></label>
              <label>host <input name="host" required /></label>
              <label>user <input name="user" required /></label>
              <label>port <input name="port" type="number" min="1" value="22" /></label>
              <label>ssh_key <input name="ssh_key" placeholder="~/.ssh/id_ed25519" required /></label>
              <label>workspace <input name="workspace" placeholder="/workspace/video_pipeline" required /></label>
              <div class="pod-form-actions">
                <button type="submit" id="pod-save-btn">Save</button>
                <button type="button" id="pod-test-btn" disabled>Test connect</button>
                <button type="button" id="pod-delete-btn" disabled>Delete</button>
                <span id="pod-form-msg" class="muted"></span>
              </div>
            </form>
          </section>
        </div>
      </div>
    </section>
    <section id="tab-run" class="tab">
      <p class="placeholder">Run — M5 里实现 (launcher + kill button)</p>
    </section>
    <section id="tab-monitor" class="tab">
      <p class="placeholder">Monitor — M6 里实现 (log tail + checkpoint counter)</p>
    </section>
  </main>

  <footer>
    <span id="health-status">checking…</span>
    <span id="version"></span>
  </footer>

  <script type="module" src="/static/app.js"></script>
</body>
</html>

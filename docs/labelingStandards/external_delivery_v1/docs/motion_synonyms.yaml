# motion_synonyms.yaml — Normalization & Synonym Dictionary
# Project: Video_DB_Face
# Version: 1.0 (2026-04-16)
#
# USAGE:
#   1. Post-processing script loads this file after VLM inference.
#   2. For each action_primary value in output JSON:
#      a. Check verb_forms → replace with canonical.
#      b. Check synonyms → replace with canonical.
#      c. Check camera_terms_forbidden → REMOVE from action fields, log warning.
#      d. Check intensity_remap → move to action_quality.intensity instead.
#   3. Validator script uses this for cross-checking.
#
# FORMAT:
#   key: canonical_value  — meaning "if you see <key>, replace with <canonical_value>"

